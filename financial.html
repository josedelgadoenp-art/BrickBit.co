<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuentra tu seguro ideal · BrickBit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#231a13; --ink-soft:#5a4d40; --paper:#f5ede3; --card:#FFFFFF;
    --naranja:#1a7d50; --naranja-d:#136645; --naranja-soft:#e6f2ea;
    --azul:#6d8a20; --verde:#1a7d50; --muted:#8a7a6b;
    --line:rgba(16,12,10,0.08); --line-2:rgba(16,12,10,0.05);
    --shadow:0 1px 2px rgba(36,28,23,.04),0 12px 32px rgba(36,28,23,.07);
    --serif:"Fraunces",Georgia,serif; --sans:"Hanken Grotesk",system-ui,-apple-system,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .shell{max-width:640px;margin:0 auto;padding:0 18px 60px}

  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 0 8px}
  .logo{height:46px;width:auto;max-width:70%;display:block}
  .badge-gnp{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--naranja-d);background:var(--naranja-soft);border:1px solid rgba(26,125,80,.18);padding:6px 11px;border-radius:999px;white-space:nowrap}

  .prog{display:flex;gap:6px;margin:14px 0 20px}
  .prog .seg{height:5px;flex:1;border-radius:3px;background:var(--line);transition:.3s}
  .prog .seg.on{background:var(--naranja)}
  .prog.hide{display:none}

  .hero{padding:16px 2px 6px;animation:fade .4s ease}
  .hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--naranja);margin:0 0 10px}
  .hero h1{font-family:var(--serif);font-weight:500;font-size:clamp(28px,7vw,40px);line-height:1.08;letter-spacing:-.015em;margin:0 0 14px}
  .hero p{font-size:16.5px;color:var(--ink-soft);margin:0 0 12px;max-width:31em}
  .hero .firma{font-size:14px;color:var(--muted);margin:0 0 26px}
  .hero .firma b{color:var(--ink-soft)}

  .step{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .qhead{margin:6px 0 20px}
  .qhead .count{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
  .qhead h2{font-family:var(--serif);font-weight:500;font-size:clamp(22px,5vw,30px);line-height:1.18;letter-spacing:-.01em;margin:0}
  .qhead .sub{font-size:14.5px;color:var(--muted);margin-top:9px}
  .swipetip{margin-top:12px;display:flex;align-items:center;gap:8px;justify-content:center;
    background:var(--naranja-soft);border:1px solid rgba(26,125,80,.18);border-radius:14px;padding:10px 14px;
    font-size:13px;color:var(--naranja-d);font-weight:600;text-align:center}
  .swipetip b{color:var(--ink)}
  .swipetip .dchev{font-size:20px;line-height:1;animation:dbob 1.3s ease-in-out infinite}
  @keyframes dbob{0%,100%{transform:translateY(-2px)}50%{transform:translateY(4px)}}

  .options{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;background:var(--card);
    border:1.5px solid var(--line);border-radius:18px;padding:17px 18px;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--ink);transition:.16s;box-shadow:var(--shadow)}
  .opt:hover{border-color:var(--naranja);transform:translateY(-1px)}
  .opt:focus-visible{outline:3px solid var(--naranja-soft);outline-offset:0;border-color:var(--naranja)}
  .opt .emoji{font-size:24px;flex:0 0 auto;width:28px;text-align:center}
  .opt .txt{flex:1}
  .opt .txt small{display:block;font-weight:400;font-size:13px;color:var(--muted);margin-top:2px}
  .opt .chev{color:var(--muted);flex:0 0 auto;transition:.16s}
  .opt:hover .chev{color:var(--naranja);transform:translateX(2px)}

  /* form persona */
  .pform{display:flex;flex-direction:column;gap:15px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:440px){.row2{grid-template-columns:1fr}}
  .fld label{display:block;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .inp{position:relative;display:flex;align-items:center}
  .inp .pre{position:absolute;left:13px;color:var(--muted);font-size:15px;pointer-events:none}
  .pform input{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);border:1.5px solid rgba(16,12,10,0.14);border-radius:14px;padding:13px 14px;background:var(--card);transition:.15s}
  .pform input.peso{padding-left:28px}
  .pform input:focus{outline:none;border-color:var(--naranja);box-shadow:0 0 0 3px var(--naranja-soft)}
  .priv{font-size:12.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start;margin-top:2px}

  /* radar */
  .radar-box{background:var(--card);border:1.5px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
  .radar-box svg{width:100%;max-width:340px;display:block;margin:0 auto;overflow:visible}
  .radar-box svg text{font-family:'Hanken Grotesk',sans-serif}
  .radar-box svg polygon[stroke-width="2.5"]{fill:rgba(169,210,63,.28)}
  .rlegend{display:flex;justify-content:center;gap:18px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;flex-wrap:wrap}
  .rlegend span{display:flex;align-items:center;gap:6px}
  .rlegend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .axes{display:flex;flex-direction:column;gap:15px}
  .axis .alab{font-size:14px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;display:flex;align-items:center;gap:8px}
  .seg3{display:flex;border:1.5px solid rgba(16,12,10,0.12);border-radius:999px;overflow:hidden;background:#fff}
  .seg3 button{flex:1;border:none;background:#fff;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--muted);padding:11px 6px;transition:.12s;border-right:1.5px solid rgba(16,12,10,0.10)}
  .seg3 button:last-child{border-right:none}
  .seg3 button:hover{background:var(--paper);color:var(--ink-soft)}
  .seg3 button.on{background:var(--ink);color:#fff}
  .seg3 button.on.lo{background:#c2593f}
  .seg3 button.on.mid{background:#b0872e}
  .seg3 button.on.hi{background:var(--verde)}
  .segN{display:flex;flex-wrap:wrap;gap:8px}
  .segN button{flex:1 1 30%;min-width:132px;white-space:nowrap;border:1.5px solid rgba(16,12,10,0.12);border-radius:999px;background:#fff;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink-soft);padding:11px 12px;transition:.12s}
  .segN button:hover{background:var(--paper);color:var(--ink-soft)}
  .segN button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chk{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);
    color:transparent;font-size:12px;font-weight:800;vertical-align:middle;margin-right:6px;transition:.18s}
  .axis.done .chk{background:var(--verde);border-color:var(--verde);color:#fff}
  .axis.done .alab{color:var(--ink)}
  .prog-wrap{position:sticky;top:0;z-index:5;background:var(--paper);padding:10px 0 12px;margin-bottom:4px}
  .prog-top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .prog-top #prog-pct{color:var(--naranja-d)}
  .prog-track{height:8px;background:rgba(16,12,10,0.08);border-radius:999px;overflow:hidden}
  .prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--naranja),#a9d23f);border-radius:999px;transition:width .4s cubic-bezier(.2,.8,.2,1)}
  .btn-primary.ready{animation:pulseR 1.4s ease-in-out 2}
  @keyframes pulseR{0%,100%{box-shadow:0 5px 16px rgba(26,125,80,.30)}50%{box-shadow:0 5px 26px rgba(169,210,63,.55)}}

  .backrow{margin-top:22px}
  .back{background:none;border:none;cursor:pointer;color:var(--muted);font-family:var(--sans);font-size:14px;font-weight:600;padding:8px 4px;display:inline-flex;align-items:center;gap:7px}
  .back:hover{color:var(--ink)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;padding:15px 26px;border-radius:999px;transition:.16s;text-decoration:none;width:100%}
  .btn-primary{background:var(--naranja);color:#fff;box-shadow:0 5px 16px rgba(26,125,80,.30)}
  .btn-primary:hover{background:#57c389;transform:translateY(-1px)}
  .btn-wa{background:#1FA855;color:#fff;box-shadow:0 5px 16px rgba(31,168,85,.3)}
  .btn-wa:hover{background:#178a45;transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid rgba(16,12,10,0.16)}
  .btn-ghost:hover{background:#fff;border-color:var(--naranja)}
  .btnrow{margin-top:22px}

  /* result */
  .result{animation:fade .4s ease}
  .greet{font-family:var(--serif);font-weight:500;font-size:clamp(24px,6vw,32px);letter-spacing:-.01em;margin:6px 0 4px}
  .greet-sub{color:var(--muted);font-size:15px;margin:0 0 22px}
  .res-line{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--azul);background:#eef2dd;padding:6px 11px;border-radius:999px;display:inline-block;margin-bottom:12px}
  .res-card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px;overflow:hidden;margin-bottom:24px}
  .res-emoji{font-size:38px;line-height:1;margin-bottom:6px}
  .res-card h2{font-family:var(--serif);font-weight:600;font-size:26px;letter-spacing:-.01em;margin:0 0 4px}
  .res-card .lead{font-size:15.5px;color:var(--ink-soft);margin:0 0 18px}
  .feat{list-style:none;padding:0;margin:0 0 18px;display:flex;flex-direction:column;gap:9px}
  .feat li{display:flex;gap:10px;font-size:14.5px;color:var(--ink-soft);align-items:flex-start}
  .feat li .tick{color:var(--verde);flex:0 0 auto;margin-top:2px}
  .res-note{font-size:13px;color:var(--ink-soft);background:var(--line-2);border-radius:14px;padding:11px 13px;margin-bottom:18px}
  .why{margin:0 0 18px;padding:14px 15px;background:var(--naranja-soft);border-radius:14px}
  .why .t{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--naranja-d);margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12.5px;background:#fff;border:1px solid rgba(26,125,80,.22);color:var(--ink-soft);padding:5px 11px;border-radius:999px}
  .terms{margin:18px 0 0;border-top:1px solid var(--line);padding-top:16px}
  .terms .t{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:10px}
  .term-chips{display:flex;flex-wrap:wrap;gap:8px}
  .term-chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--ink);background:var(--paper);border:1px solid var(--line);padding:6px 8px 6px 12px;border-radius:999px}

  .section-h{font-family:var(--serif);font-weight:500;font-size:22px;margin:0 0 4px}
  .section-p{color:var(--muted);font-size:14px;margin:0 0 14px}
  .gap-note{font-size:14px;color:var(--ink-soft);background:#eef2dd;border-radius:14px;padding:13px 15px;margin-top:6px}
  .gap-note b{color:var(--azul)}

  .cta{display:flex;flex-direction:column;gap:11px;margin-top:8px}
  .cta-note{font-size:12.5px;color:var(--muted);text-align:center}
  .restart{margin-top:20px;text-align:center}

  .help{display:inline-grid;place-items:center;width:19px;height:19px;border-radius:50%;border:none;cursor:pointer;background:var(--ink);color:#fff;font-family:var(--sans);font-weight:700;font-size:12px;line-height:1;padding:0;vertical-align:middle;transition:.15s}
  .term-chip .help{background:var(--naranja);width:18px;height:18px}
  .axis .help{width:17px;height:17px;background:var(--muted)}
  .help:hover{transform:scale(1.12)}
  .help:focus-visible{outline:3px solid var(--naranja-soft);outline-offset:1px}

  #tip{position:fixed;z-index:90;max-width:280px;background:var(--ink);color:#fff;font-size:13px;line-height:1.5;padding:13px 15px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.22);opacity:0;visibility:hidden;transform:translateY(4px);transition:opacity .15s,transform .15s;pointer-events:none}
  #tip.show{opacity:1;visibility:visible;transform:none}
  #tip b{color:#cdf25a;display:block;margin-bottom:3px;font-family:var(--mono);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  #tip::after{content:"";position:absolute;top:-6px;left:var(--ax,20px);border:6px solid transparent;border-top:0;border-bottom-color:var(--ink)}

  .advice{margin-top:26px;background:linear-gradient(135deg,#e6f2ea,#dcedd4);border:1.5px solid rgba(26,125,80,.22);border-radius:18px;padding:22px;text-align:center}
  .advice h3{font-family:var(--serif);font-weight:600;font-size:21px;margin:0 0 6px}
  .advice p{font-size:14px;color:var(--ink-soft);margin:0 0 14px;line-height:1.55}
  .advice .free{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--naranja-d);background:#fff;border:1px solid rgba(26,125,80,.22);border-radius:999px;padding:5px 12px;margin-bottom:10px}
  .scrollhint{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:80;
    display:flex;align-items:center;gap:9px;background:var(--ink);color:#fff;border-radius:999px;
    padding:10px 18px;font-size:13.5px;font-weight:600;box-shadow:0 10px 28px rgba(26,34,48,.28);
    opacity:0;visibility:hidden;transition:opacity .3s}
  .scrollhint.show{opacity:1;visibility:visible}
  .scrollhint .finger{font-size:19px;animation:swipe 1.5s ease-in-out infinite}
  .scrollhint .chev{color:#cdf25a;animation:bob 1.5s ease-in-out infinite}
  @keyframes swipe{0%,100%{transform:translateY(5px)}50%{transform:translateY(-5px)}}
  @keyframes bob{0%,100%{transform:translateY(-2px)}50%{transform:translateY(4px)}}
  footer{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;line-height:1.55}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>

function updateRadarProgress(){
  const total=RADAR.length;
  const done=RADAR.filter(a=>radarDone[a.key]).length;
  const pct=Math.round(done/total*100);
  const fill=document.getElementById('prog-fill'); if(fill) fill.style.width=pct+'%';
  const txt=document.getElementById('prog-txt'); if(txt) txt.textContent=done+' de '+total+' áreas';
  const pc=document.getElementById('prog-pct'); if(pc) pc.textContent=pct+'%';
  const cont=document.getElementById('rContinue');
  if(cont){
    if(done===total){ cont.classList.add('ready'); cont.innerHTML='Ver mi resultado <span aria-hidden="true">→</span>'; }
    else { cont.classList.remove('ready'); }
  }
}

function drawRadar(svgId){
  const svg=document.getElementById(svgId); if(!svg)return;
  const cx=160,cy=148,R=104,n=RADAR.length;
  const ang=i=>(-90+i*(360/n))*Math.PI/180;
  const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
  let h="";
  [0.25,0.5,0.75,1].forEach(f=>{h+=`<polygon points="${RADAR.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;});
  RADAR.forEach((a,i)=>{
    const[x,y]=pt(i,R);
    h+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20);
    const anchor=Math.abs(lx-cx)<6?'middle':(lx>cx?'start':'end');
    h+=`<text x="${lx}" y="${ly}" font-size="11" font-weight="600" fill="var(--ink-soft)" text-anchor="${anchor}" dominant-baseline="middle" font-family="Inter">${a.short}</text>`;
  });
  h+=`<polygon points="${RADAR.map((_,i)=>pt(i,R).join(',')).join(' ')}" fill="none" stroke="var(--naranja)" stroke-width="1.5" stroke-dasharray="4 4" opacity=".75"/>`;
  const pa=RADAR.map((a,i)=>pt(i,R*Math.max(0,Math.min(100,radarVals[a.key]))/100).join(',')).join(' ');
  h+=`<polygon points="${pa}" fill="rgba(31,111,139,.22)" stroke="var(--azul)" stroke-width="2.5" stroke-linejoin="round"/>`;
  RADAR.forEach((a,i)=>{const[x,y]=pt(i,R*radarVals[a.key]/100);h+=`<circle cx="${x}" cy="${y}" r="3.5" fill="var(--azul)"/>`;});
  svg.innerHTML=h;
}

function showResult(){
  phase="result"; setProg(4);
  const sh=document.getElementById('scrollhint'); if(sh) sh.classList.remove('show');
  const p=PRODUCTS[productKey]; if(!p){renderHero();return;}

  // mayor hueco
  let minV=101,gap=null;
  RADAR.forEach(a=>{ if(radarVals[a.key]<minV){minV=radarVals[a.key];gap=a;} });
  const allHigh=RADAR.every(a=>radarVals[a.key]>=100);
  const gapLabel=gap?gap.full:"";

  const nom=[persona.nombre,persona.apellido].filter(Boolean).join(' ').trim();
  let msg=`Hola ${AGENTE.nombre}, soy ${nom||'(prospecto)'}`;
  if(persona.edad) msg+=` (${persona.edad} años)`;
  msg+=`. Usé tu buscador y me interesa el ${p.nombre}.`;
  if(persona.ingreso && persona.ingreso!=="Prefiero no decir")
    msg+=` Mi ingreso mensual aproximado: ${persona.ingreso}.`;
  if(!allHigh && gapLabel) msg+=` Mi área menos protegida es: ${gapLabel}.`;
  msg+=` ¿Me puedes dar más información?`;
  const wa=AGENTE.whatsapp?`https://wa.me/${AGENTE.whatsapp}?text=${encodeURIComponent(msg)}`:"";
  const mail=AGENTE.email?`mailto:${AGENTE.email}?subject=${encodeURIComponent('Interés: '+p.nombre)}&body=${encodeURIComponent(msg)}`:"";

  // Datos base del prospecto para el Google Sheet (vía /api/lead).
  const leadBase = {
    nombre:persona.nombre, apellido:persona.apellido, edad:persona.edad,
    telefono:persona.telefono, ingreso:persona.ingreso,
    producto:p.nombre, linea:p.linea,
    hueco:(!allHigh&&gapLabel)?gapLabel:"",
    respuestas:chosen.join(" | ")
  };

  // Captura pasiva: todo diagnóstico completado se registra como prospecto.
  // Los clics en agendar/WhatsApp mandan un registro extra con la acción.
  if(!resultadoEnviado){
    resultadoEnviado=true;
    sendLead({...leadBase, fecha:new Date().toISOString(),
              origen:"diagnostico-completado", accion:"Completó el diagnóstico"});
  }

  const greetName=persona.nombre?`Hola, ${persona.nombre}`:"Tu resultado";

  app.innerHTML=`
    <section class="result">
      <h1 class="greet">${greetName}</h1>
      <p class="greet-sub">Esto es lo que mejor encaja con lo que nos contaste.</p>

      <span class="res-line">Te recomendamos · ${p.linea}</span>
      <div class="res-card">
        <div class="res-emoji" aria-hidden="true">${p.emoji}</div>
        <h2>${p.nombre}</h2>
        <p class="lead">${p.lead}</p>
        <div class="why"><div class="t">Por qué encaja contigo</div>
          <div class="chips">${chosen.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div>
        <ul class="feat">${p.feat.map(f=>`<li><span class="tick" aria-hidden="true">✓</span><span>${f}</span></li>`).join('')}</ul>
        ${p.note?`<div class="res-note">${p.note}</div>`:""}
        <div class="terms"><div class="t">Términos clave (toca el “?” para ver qué significan)</div>
          <div class="term-chips">${p.terms.map(t=>GLOSARIO[t]?`<span class="term-chip">${GLOSARIO[t][0]} ${helpHTML(t)}</span>`:"").join('')}</div></div>
      </div>

      <h3 class="section-h">Tu radar de protección</h3>
      <p class="section-p">Una foto de tus áreas protegidas y las que están descubiertas.</p>
      <div class="radar-box">
        <svg id="radarRes" viewBox="0 0 320 300" role="img" aria-label="Tu radar de protección"></svg>
        <div class="rlegend">
          <span><i style="background:var(--azul)"></i>Lo que ya tienes</span>
          <span><i style="background:transparent;outline:1.5px dashed var(--naranja)"></i>Protección ideal</span>
        </div>
      </div>
      <div class="gap-note">${allHigh
        ? `¡Excelente! Tu protección se ve muy completa. Vale la pena una revisión anual para mantenerla al día.`
        : `Tu área menos protegida es <b>${gapLabel}</b>. Además del producto que buscas, podríamos revisar este punto para cerrar tu mayor hueco de protección.`}</div>

      <div class="cta" style="margin-top:22px">
        ${mail?`<a class="btn btn-ghost" href="${mail}">Escribir un correo</a>`:""}
      </div>
      <div class="advice">
        <span class="free">Sin costo · Sin compromiso</span>
        <h3>Asesoría financiera gratuita</h3>
        <p>Más allá del seguro: revisamos juntos tu protección, tu ahorro y tu plan a futuro en una sesión de 30 minutos, totalmente gratis. Sales con un plan claro, contrates o no.</p>
        <a class="btn btn-primary" id="calBtn" href="${CALENDLY}" target="_blank" rel="noopener"><span aria-hidden="true">📅</span> Quiero agendar la reunión ahora <span class="sr-only">(se abre en una pestaña nueva)</span></a>
        ${wa?`<a class="btn btn-wa" id="adviceBtn" href="${wa}" target="_blank" rel="noopener">Hablar con ${AGENTE.nombre} por WhatsApp</a>`:""}
        <p class="cta-note" style="margin-top:10px">Te atenderá ${AGENTE.nombre}, ${AGENTE.rol}.</p>
      </div>
      <div class="restart"><button class="back" id="restartBtn">↺ Empezar de nuevo</button></div>
    </section>`;
  drawRadar('radarRes');
  // Al agendar por Calendly → registra el lead (acción explícita del usuario)
  const cal=document.getElementById('calBtn');
  if(cal) cal.addEventListener('click',()=>sendLead({
    ...leadBase, fecha:new Date().toISOString(),
    origen:"agendar-calendly", accion:"Agendó reunión (Calendly)"
  }));
  // Al contactar por WhatsApp → también registra el lead
  const adv=document.getElementById('adviceBtn');
  if(adv) adv.addEventListener('click',()=>sendLead({
    ...leadBase, fecha:new Date().toISOString(),
    origen:"whatsapp-agente", accion:"Contactó por WhatsApp"
  }));
  document.getElementById('restartBtn').addEventListener('click',()=>{
    persona={nombre:"",apellido:"",edad:"",telefono:"",ingreso:""};
    radarVals={vida:0,gmm:0,auto:0,retiro:0,emerg:0,ingreso:0};
    radarDone={vida:false,gmm:false,auto:false,retiro:false,emerg:false,ingreso:false};
    finderHistory=[];chosen=[];productKey=null;stepId="start";resultadoEnviado=false;
    renderHero();
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ==== indicador de deslizar (paso del radar) ==== */
function showScrollHint(){
  const sh=document.getElementById('scrollhint');
  const need=()=>document.documentElement.scrollHeight>window.innerHeight+60;
  if(!need()){ sh.classList.remove('show'); return; }
  sh.classList.add('show');
  const off=()=>{ sh.classList.remove('show'); window.removeEventListener('scroll',off); };
  setTimeout(()=>window.addEventListener('scroll',off,{passive:true}),200);
  setTimeout(off,9000); /* se esconde solo tras 9 s */
}

/* ============================================================
   TOOLTIPS
============================================================ */
const tip=document.getElementById('tip'); let pinned=null;
const canHover=window.matchMedia('(hover:hover)').matches;
function showTip(btn){
  const g=GLOSARIO[btn.dataset.term]; if(!g)return;
  tip.innerHTML=`<b>${g[0]}</b>${g[1]}`; tip.classList.add('show');
  const r=btn.getBoundingClientRect(),tw=tip.offsetWidth,th=tip.offsetHeight;
  let left=Math.max(10,Math.min(r.left+r.width/2-tw/2,window.innerWidth-tw-10));
  let top=r.bottom+10; if(top+th>window.innerHeight-10) top=r.top-th-10;
  tip.style.left=left+'px'; tip.style.top=top+'px';
  tip.style.setProperty('--ax',(r.left+r.width/2-left-6)+'px');
}
function hideTip(){tip.classList.remove('show');pinned=null;}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.help');
  if(btn){e.preventDefault(); if(pinned===btn)hideTip(); else{pinned=btn;showTip(btn);} return;}
  if(pinned&&!e.target.closest('#tip'))hideTip();
});
document.addEventListener('mouseover',e=>{if(!canHover)return;const b=e.target.closest('.help');if(b&&!pinned)showTip(b);});
document.addEventListener('mouseout',e=>{if(!canHover||pinned)return;if(e.target.closest('.help'))hideTip();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideTip();});
window.addEventListener('scroll',()=>{if(pinned)hideTip();},{passive:true});

/* ============================================================
   INIT
============================================================ */
document.getElementById('foot').innerHTML=
  `Herramienta orientativa de asesoría de ${AGENTE.nombre}, Agente Profesional en Seguros GNP. La información de productos es general y puede cambiar; la cobertura, condiciones y costo definitivos se confirman en una cotización formal de GNP.`;
renderHero();
</script>
