name = "brickbit-api"
main = "worker.js"
compatibility_date = "2026-07-01"

# Orígenes permitidos para CORS, separados por comas.
# En producción cámbialo por tu dominio, p. ej. "https://brickbit.co"
[vars]
ALLOWED_ORIGINS = "*"

# Para habilitar los enlaces cortos de "Compartir proyecto":
#   1. npx wrangler kv namespace create SHARES
#   2. Copia el id que imprime y descomenta estas líneas:
#
# [[kv_namespaces]]
# binding = "SHARES"
# id = "PEGA_AQUI_EL_ID"

# Crons:
#  - "0 14 1 * *"  informe mensual Valor Futuro por correo (día 1, 14:00 UTC).
#                  Solo actúa si existen el KV SHARES y el secreto RESEND_API_KEY.
#  - "0 15 * * 1"  alertas de zona por WhatsApp, cada lunes 15:00 UTC. Solo actúa
#                  si están los secretos SUPABASE_* y TWILIO_* (si no, no hace nada).
[triggers]
crons = ["0 14 1 * *", "0 15 * * 1"]
