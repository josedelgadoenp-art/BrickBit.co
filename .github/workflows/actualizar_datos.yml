# ═══════════════════════════════════════════════════════════════════════════
# BrickBit · Frescura de datos del Motor de Morfogénesis
# ═══════════════════════════════════════════════════════════════════════════
# El DENUE publica cortes ~2 veces al año (abril/mayo y noviembre). Este
# workflow reingesta todo automáticamente y abre un PR con los datos nuevos
# para revisión — la herramienta de asesoría nunca opera con una foto vieja.
#
# · Corre solo (cron) cada 1 de junio y 1 de diciembre, o a mano desde
#   la pestaña Actions (workflow_dispatch).
# · Los runners de GitHub SÍ alcanzan inegi.org.mx (sin proxy restrictivo).

name: Actualizar datos DENUE

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 8 1 6,12 *"     # 1 jun y 1 dic, 08:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  reingesta:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias mínimas
        run: pip install pandas numpy

      - name: Reingerir agregados nacionales (municipios + CP)
        run: |
          rm -f data/denue_municipal.csv
          python scripts/ingerir_denue_nacional.py
          python scripts/ingerir_denue_nacional.py cp 09

      - name: Reingerir las ciudades a nivel calle
        run: |
          # borra las salidas para forzar regeneración con el corte nuevo
          rm -f data/calles_*.json data/establecimientos_*.csv.gz \
                data/sismografo_*.json
          python scripts/ingerir_ciudades.py

      - name: Abrir PR con el corte nuevo
        uses: peter-evans/create-pull-request@v6
        with:
          branch: datos/actualizacion-denue
          commit-message: "Actualización automática del corte DENUE"
          title: "📡 Corte nuevo del DENUE — actualización automática de datos"
          body: |
            Reingesta automática del corte más reciente del DENUE/INEGI:
            agregados municipales y por CP, y las ciudades a nivel calle.

            Generado por `.github/workflows/actualizar_datos.yml`.
            Revisa los conteos en el diff antes de fusionar.
          labels: datos, automatizacion
