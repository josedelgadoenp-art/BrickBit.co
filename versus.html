<style>
:root{--bg:#0e0a07;--tx:#f5ede3;--mut:#a89a8c;--for:#1a7d50;--lim:#cdf25a;--amb:#F5C277;--grn:#2DD49B;--neg:#F08886}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:'Hanken Grotesk',system-ui,sans-serif;overflow:hidden}
.split{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr}
.pane{position:relative;overflow:hidden}
.pane+.pane{border-left:2px solid rgba(245,194,119,.5)}
.pane .m3d{position:absolute;inset:0}
.glass{background:rgba(14,10,7,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(245,237,227,.14);border-radius:14px;padding:12px 14px}
.sel{position:absolute;z-index:10;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center}
select{background:#14100c;color:var(--tx);border:1px solid rgba(245,237,227,.2);border-radius:10px;
  padding:9px 12px;font-family:inherit;font-size:14px;font-weight:700;outline:none;cursor:pointer;max-width:46vw}
select:focus{border-color:var(--amb)}
.vs{position:fixed;z-index:30;top:12px;left:50%;transform:translateX(-50%);
  width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#8a5a20,var(--amb));
  color:#1a1208;font-weight:900;font-size:15px;display:grid;place-items:center;border:2px solid rgba(245,237,227,.25)}
.table{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:14px;width:min(680px,95vw);padding:13px 16px}
.trow{display:grid;grid-template-columns:1fr 130px 1fr;gap:8px;align-items:center;font-size:13px;
  padding:5px 0;border-bottom:1px dashed rgba(245,237,227,.09)}
.trow:last-child{border-bottom:none}
.trow .lab{text-align:center;color:var(--mut);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.trow .va{text-align:right;font-weight:700}.trow .vb{text-align:left;font-weight:700}
.win{color:var(--grn)} .lose{color:var(--mut)} .tie{color:var(--tx)}
.back{position:fixed;z-index:30;top:12px;left:12px}
.back a{color:var(--grn);text-decoration:none;font-size:12.5px;font-weight:700}
.load{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:50;transition:opacity .5s}
.load.off{opacity:0;pointer-events:none}
.sub{font-size:12px;color:var(--mut)}
.note{text-align:center;color:var(--mut);font-size:10px;margin-top:6px}
.note .amb{color:var(--amb)}
@media(max-width:760px){
  .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .pane+.pane{border-left:none;border-top:2px solid rgba(245,194,119,.5)}
  select{max-width:70vw}
  .table{bottom:8px;max-height:38vh;overflow:auto}
}
</style>
</head>

const GMAPS_KEY='AIzaSyC15vodxaWS_VyFiqlRUwYlTtXyKUkSW5o';
const $=id=>document.getElementById(id);
const VIEW={range:900,tilt:72};
let maps={A:null,B:null}, cur={A:'Ciudad de México',B:'Monterrey'}, lib=null, orbiting=false;
function startOrbit(side){
  const z=Z(cur[side]), m=maps[side];
  if(m && m.flyCameraAround) m.flyCameraAround({camera:{center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25},durationMillis:240000,rounds:1});
}
function toggleOrbit(){
  orbiting=!orbiting;
  document.getElementById('orb').style.background=orbiting?'linear-gradient(135deg,#8a5a20,#F5C277)':'rgba(14,10,7,.7)';
  ['A','B'].forEach(s=>{
    const m=maps[s]; if(!m) return;
    if(orbiting) startOrbit(s);
    else if(m.stopCameraAnimation) m.stopCameraAnimation();
  });
}

function opt(){ return DATA.map(z=>'<option value="'+z.n+'">'+z.n+'</option>').join(''); }
function Z(n){ return DATA.find(z=>z.n===n); }
function g10(z){ /* crecimiento índice SHF 2016→2026 */
  const s=z.s||{}; if(!s[2016]||!s[2026]) return null;
  return (s[2026]/s[2016]-1)*100;
}
function f5(z){ const f=z.f&&z.f['5']; return f?(f.f-1)*100:null; }

async function init(){
  try{
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://maps.googleapis.com/maps/api/js?key='+GMAPS_KEY+'&v=alpha&libraries=maps3d&language=es&region=MX';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    lib=await google.maps.importLibrary('maps3d');
    $('selA').innerHTML=opt(); $('selB').innerHTML=opt();
    $('selA').value=cur.A; $('selB').value=cur.B;
    makeMap('A'); makeMap('B');
    $('load').classList.add('off');
    renderTable();
  }catch(e){
    $('load').innerHTML='<div class="glass" style="max-width:420px;text-align:center"><h1>No se pudo cargar el 3D</h1><p class="sub">Revisa la API key / cobertura.</p></div>';
  }
}
function makeMap(side){
  const z=Z(cur[side]);
  const m=new lib.Map3DElement({center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25,mode:(lib.MapMode&&lib.MapMode.HYBRID)||'HYBRID'});
  m.style.width='100%';m.style.height='100%';
  $('map'+side).appendChild(m);
  maps[side]=m;  /* vista estática: máxima nitidez de tiles */
}
function setCity(side,n){
  cur[side]=n; const z=Z(n); const m=maps[side];
  if(m&&m.stopCameraAnimation) m.stopCameraAnimation();
  if(m&&m.flyCameraTo){
    m.flyCameraTo({endCamera:{center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25},durationMillis:2600});
    if(orbiting) setTimeout(()=>startOrbit(side),2700);
  }
  renderTable();
}
function row(lab,va,vb,fmt,higherWins){
  const fa=va==null?'—':fmt(va), fb=vb==null?'—':fmt(vb);
  let ca='tie',cb='tie';
  if(va!=null&&vb!=null&&va!==vb){
    const aw=higherWins? va>vb : va<vb;
    ca=aw?'win':'lose'; cb=aw?'lose':'win';
  }
  return '<div class="trow"><span class="va '+ca+'">'+fa+'</span><span class="lab">'+lab+'</span><span class="vb '+cb+'">'+fb+'</span></div>';
}
function renderTable(){
  const a=Z(cur.A), b=Z(cur.B);
  const money=v=>'$'+Math.round(v).toLocaleString('es-MX');
  const pct=v=>v.toFixed(1)+'%';
  $('tbl').innerHTML=
    '<div class="trow"><span class="va" style="font-size:15px">'+a.n+'</span><span class="lab">ciudad</span><span class="vb" style="font-size:15px">'+b.n+'</span></div>'+
    row('Precio /m²',a.p,b.p,money,false)+
    row('Plusvalía /año',a.pl,b.pl,pct,true)+
    row('Yield renta',a.y,b.y,pct,true)+
    row('SHF 2016→2026',g10(a),g10(b),pct,true)+
    row('Pronóstico 5 años',f5(a),f5(b),pct,true)+
    '<div class="trow"><span class="va">'+(a.ci||'—')+'</span><span class="lab">ciclo</span><span class="vb">'+(b.ci||'—')+'</span></div>'+
    '<div class="note">Verde = mejor en ese renglón (precio: gana el más accesible) · <span class="amb">pronóstico BrickBit = estimado</span> · fuente SHF</div>';
}
init();
