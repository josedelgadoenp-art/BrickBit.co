<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrickBit · Versus (municipios)</title>
<meta name="description" content="Compara dos ciudades de México lado a lado en 3D: precio, plusvalía, yield y pronóstico BrickBit.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#100c0a;--surface:#1d1713;--surface2:#241c17;--tx:#f5ede3;--mut:#a89a8c;
  --for:#1a7d50;--lim:#cdf25a;--lime-deep:#a9d23f;--amb:#F5C277;--grn:#57c389;--neg:#e06d5a;
  --line:rgba(245,237,227,0.10);--line-strong:rgba(245,237,227,0.18)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:'Hanken Grotesk',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
.split{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr}
.pane{position:relative;overflow:hidden}
.pane+.pane{border-left:2px solid var(--line-strong)}
.pane .m3d{position:absolute;inset:0}
.glass{background:rgba(16,12,10,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line-strong);border-radius:18px;padding:12px 14px}
.sel{position:absolute;z-index:10;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center}
select{background:rgba(16,12,10,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--tx);border:1px solid var(--line-strong);border-radius:999px;
  padding:9px 16px;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:14px;font-weight:600;outline:none;cursor:pointer;max-width:46vw}
select:focus{border-color:var(--grn)}
.vs{position:fixed;z-index:30;top:12px;left:50%;transform:translateX(-50%);
  width:46px;height:46px;border-radius:999px;background:var(--for);
  color:#fff;font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:16px;display:grid;place-items:center;border:1px solid var(--line-strong)}
.table{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:14px;width:min(680px,95vw);padding:13px 16px}
.trow{display:grid;grid-template-columns:1fr 130px 1fr;gap:8px;align-items:center;font-size:12.5px;
  padding:5px 0;border-bottom:1px dashed var(--line)}
.trow:last-child{border-bottom:none}
.trow .lab{text-align:center;color:var(--mut);font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase}
.trow .va{text-align:right;font-family:'Space Mono',monospace;font-size:11.5px;font-weight:700}
.trow .vb{text-align:left;font-family:'Space Mono',monospace;font-size:11.5px;font-weight:700}
.win{color:var(--grn)} .lose{color:var(--mut)} .tie{color:var(--tx)}
.back{position:fixed;z-index:30;top:12px;left:12px}
.back a{color:var(--grn);text-decoration:none;font-size:12.5px;font-weight:700}
.back a:hover{color:var(--lim)}
.load{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:50;transition:opacity .5s}
.load.off{opacity:0;pointer-events:none}
.sub{font-size:12px;color:var(--mut)}
.note{text-align:center;color:var(--mut);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;margin-top:8px}
.note .amb{color:var(--amb)}
@media(max-width:760px){
  .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .pane+.pane{border-left:none;border-top:2px solid var(--line-strong)}
  select{max-width:70vw}
  .table{bottom:8px;max-height:38vh;overflow:auto}
}
</style>
</head>
<body>
<div class="load" id="load"><div style="text-align:center"><div style="font-size:34px">⚔️</div><p class="sub">Preparando el duelo…</p></div></div>
<div class="back glass"><a href="index.html">← BrickBit</a></div>
<div class="vs">VS</div>
<button id="orb" onclick="toggleOrbit()" title="Órbita (puede bajar la nitidez)" style="position:fixed;z-index:30;top:66px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:999px;border:1px solid var(--line-strong);background:rgba(16,12,10,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--tx);font-size:14px;cursor:pointer">🎥</button>
<div class="split">
  <div class="pane" id="paneA">
    <div class="m3d" id="mapA"></div>
    <div class="sel"><select id="selA" onchange="setCity('A',this.value)"></select></div>
  </div>
  <div class="pane" id="paneB">
    <div class="m3d" id="mapB"></div>
    <div class="sel"><select id="selB" onchange="setCity('B',this.value)"></select></div>
  </div>
</div>
<div class="table glass" id="tbl"></div>

<script>

const GMAPS_KEY='AIzaSyC15vodxaWS_VyFiqlRUwYlTtXyKUkSW5o';
const $=id=>document.getElementById(id);
const VIEW={range:900,tilt:72};
let maps={A:null,B:null}, cur={A:'Ciudad de México',B:'Monterrey'}, lib=null, orbiting=false;
function startOrbit(side){
  const z=Z(cur[side]), m=maps[side];
  if(m && m.flyCameraAround) m.flyCameraAround({camera:{center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25},durationMillis:240000,rounds:1});
}
function toggleOrbit(){
  orbiting=!orbiting;
  document.getElementById('orb').style.background=orbiting?'linear-gradient(135deg,#8a5a20,#F5C277)':'rgba(14,10,7,.7)';
  ['A','B'].forEach(s=>{
    const m=maps[s]; if(!m) return;
    if(orbiting) startOrbit(s);
    else if(m.stopCameraAnimation) m.stopCameraAnimation();
  });
}

/* Duelo por MUNICIPIOS (menos ambiguo que ciudad/ZM). Datos SHF municipales. */
let MUNI=[];
async function loadMuni(){
  try{
    const r=await fetch('data/municipios_full.json'); const j=await r.json();
    MUNI=(j.municipios||[]).map(m=>({ n:m.m+', '+m.e, muni:m.m, edo:m.e, lat:m.lat, lng:m.lng,
      di:m.di, pl:(m.pl!=null?m.pl:null), ci:(m.ci||null), op:(m.op||null),
      neg:m.neg, emp:m.emp, res:m.res, alt:m.alt }));
    MUNI.sort((a,b)=>b.di-a.di);       // ganadores (más dinámicos) primero
    if(MUNI.length>=2){ cur.A=MUNI[0].n; cur.B=MUNI[1].n; }
  }catch(e){ MUNI=[]; }
}
function opt(){ return MUNI.map(z=>'<option value="'+z.n+'">'+z.n+'</option>').join(''); }
function Z(n){ return MUNI.find(z=>z.n===n); }
function _muniScore(z){ return z.di||0; }

async function init(){
  try{
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://maps.googleapis.com/maps/api/js?key='+GMAPS_KEY+'&v=alpha&libraries=maps3d&language=es&region=MX';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    lib=await google.maps.importLibrary('maps3d');
    await loadMuni();
    $('selA').innerHTML=opt(); $('selB').innerHTML=opt();
    $('selA').value=cur.A; $('selB').value=cur.B;
    makeMap('A'); makeMap('B');
    $('load').classList.add('off');
    renderTable();
  }catch(e){
    $('load').innerHTML='<div class="glass" style="max-width:420px;text-align:center"><h1>No se pudo cargar el 3D</h1><p class="sub">Revisa la API key / cobertura.</p></div>';
  }
}
function makeMap(side){
  const z=Z(cur[side]); if(!z) return;
  const m=new lib.Map3DElement({center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25,mode:(lib.MapMode&&lib.MapMode.HYBRID)||'HYBRID'});
  m.style.width='100%';m.style.height='100%';
  $('map'+side).appendChild(m);
  maps[side]=m;  /* vista estática: máxima nitidez de tiles */
}
function setCity(side,n){
  cur[side]=n; const z=Z(n); const m=maps[side];
  if(m&&m.stopCameraAnimation) m.stopCameraAnimation();
  if(m&&m.flyCameraTo){
    m.flyCameraTo({endCamera:{center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25},durationMillis:2600});
    if(orbiting) setTimeout(()=>startOrbit(side),2700);
  }
  renderTable();
}
function row(lab,va,vb,fmt,higherWins){
  const fa=va==null?'—':fmt(va), fb=vb==null?'—':fmt(vb);
  let ca='tie',cb='tie';
  if(va!=null&&vb!=null&&va!==vb){
    const aw=higherWins? va>vb : va<vb;
    ca=aw?'win':'lose'; cb=aw?'lose':'win';
  }
  return '<div class="trow"><span class="va '+ca+'">'+fa+'</span><span class="lab">'+lab+'</span><span class="vb '+cb+'">'+fb+'</span></div>';
}
function renderTable(){
  const a=Z(cur.A), b=Z(cur.B); if(!a||!b) return;
  const pct=v=>'+'+(+v).toFixed(1)+'%', n0=v=>Math.round(v).toLocaleString('es-MX'), p2=v=>(+v).toFixed(2), di=v=>Math.round(v)+'/100';
  const sa=_muniScore(a), sb=_muniScore(b), winner=sa===sb?null:(sa>sb?a:b);
  const verdict=winner?'<div class="trow" style="background:rgba(87,195,137,.10)"><span class="va '+(winner===a?'win':'lose')+'">🏆</span><span class="lab" style="color:var(--grn);font-weight:700">Más dinámico: '+winner.muni+'</span><span class="vb '+(winner===b?'win':'lose')+'">'+(winner===b?'🏆':'')+'</span></div><div style="font-size:10.5px;color:var(--mut);text-align:center;padding:4px 0">🏆 mide el <b>dinamismo económico</b> (DENUE), no un veredicto de inversión — compara cada fila por separado.</div>':'';
  $('tbl').innerHTML=
    '<div class="trow"><span class="va" style="font-size:15px">'+a.muni+'</span><span class="lab">municipio</span><span class="vb" style="font-size:15px">'+b.muni+'</span></div>'+
    row('Dinamismo DENUE',a.di,b.di,di,true)+
    row('Plusvalía /año SHF',a.pl,b.pl,pct,true)+
    row('Negocios activos',a.neg,b.neg,n0,true)+
    row('Empleo formal',a.emp,b.emp,n0,true)+
    row('Diversificación',a.res,b.res,p2,true)+
    row('Aperturas recientes',a.alt,b.alt,n0,true)+
    '<div class="trow"><span class="va" style="font-size:11px;color:var(--mut)">'+a.edo+'</span><span class="lab">estado</span><span class="vb" style="font-size:11px;color:var(--mut)">'+b.edo+'</span></div>'+
    verdict+
    '<div class="note">Verde = mejor · <span class="amb">Dinamismo = índice DENUE de actividad económica</span> · Plusvalía SHF solo donde existe · fuente INEGI/SHF. <button onclick="versusPDF()" style="margin-top:8px;background:none;border:1px solid var(--line-strong);color:var(--tx);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:11px">🖨 Comparar en PDF</button></div>';
}
function versusPDF(){
  const a=Z(cur.A), b=Z(cur.B); if(!a||!b) return;
  const sa=_muniScore(a), sb=_muniScore(b), winner=sa===sb?null:(sa>sb?a:b);
  const fdate=new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});
  const n0=v=>Math.round(v).toLocaleString('es-MX');
  const pl=v=>v==null?'s/d':'+'+(+v).toFixed(1)+'%';
  const tr=(l,x,y)=>'<tr><td>'+l+'</td><td class="r b">'+x+'</td><td class="r b">'+y+'</td></tr>';
  const w=window.open('','_blank'); if(!w){ alert('Permite las ventanas emergentes para el PDF.'); return; }
  w.document.write('<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Versus · '+a.muni+' vs '+b.muni+'</title>'+
   '<style>body{font-family:system-ui,-apple-system,sans-serif;color:#21292f;max-width:760px;margin:24px auto;padding:0 20px}'+
   '.head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #1a7d50;padding-bottom:12px}'+
   '.brand{font-size:26px;font-weight:800;letter-spacing:-1px;color:#0F6E56}.brand span{color:#1a7d50}.meta{font-size:12px;color:#6c787d}'+
   'h1{font-size:20px;margin:16px 0 2px}p{font-size:13px}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}td{padding:7px 5px;border-bottom:1px solid #e7ecea}td.r{text-align:right}td.b{font-weight:700;color:#0F6E56}'+
   '.foot{margin-top:20px;border-top:1px solid #d8e0dd;padding-top:10px;font-size:10.5px;color:#7a878c}@media print{@page{margin:16mm}}</style></head><body>'+
   '<div class="head"><div><div class="brand">brick<span>bit</span></div><div class="meta">Versus · duelo de municipios</div></div><div class="meta">'+fdate+'</div></div>'+
   '<h1>'+a.muni+'  vs  '+b.muni+'</h1>'+
   (winner?'<p style="color:#0F6E56;font-weight:700">🏆 Gana '+winner.n+'</p>':'<p>Empate técnico.</p>')+
   '<table><tr><td></td><td class="r b">'+a.muni+'</td><td class="r b">'+b.muni+'</td></tr>'+
   tr('Dinamismo DENUE',Math.round(a.di)+'/100',Math.round(b.di)+'/100')+
   tr('Plusvalía /año SHF',pl(a.pl),pl(b.pl))+
   tr('Negocios activos',n0(a.neg),n0(b.neg))+
   tr('Empleo formal',n0(a.emp),n0(b.emp))+
   tr('Diversificación',(+a.res).toFixed(2),(+b.res).toFixed(2))+
   tr('Aperturas recientes',n0(a.alt),n0(b.alt))+
   tr('Estado',a.edo,b.edo)+
   '</table>'+
   '<div class="foot"><b>BrickBit</b> · Dinamismo: índice DENUE (INEGI) de actividad económica. Plusvalía: SHF real donde existe. No es asesoría de inversión.</div>'+
   '<script>setTimeout(function(){window.print();},350);<\/script></body></html>');
  w.document.close();
}
init();
</script>
  <script defer src="/iris.js"></script>
</body>
</html>
