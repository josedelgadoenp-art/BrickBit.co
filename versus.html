.trow:last-child{border-bottom:none}

.trow .vb{text-align:left;font-family:'Space Mono',monospace;font-size:11.5px;font-weight:700}
.win{color:var(--grn)} .lose{color:var(--mut)} .tie{color:var(--tx)}
.back{position:fixed;z-index:30;top:12px;left:12px}
.back a{color:var(--grn);text-decoration:none;font-size:12.5px;font-weight:700}
.back a:hover{color:var(--lim)}
.load{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:50;transition:opacity .5s}
.load.off{opacity:0;pointer-events:none}
.sub{font-size:12px;color:var(--mut)}
.note{text-align:center;color:var(--mut);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;margin-top:8px}
.note .amb{color:var(--amb)}

  if(m&&m.stopCameraAnimation) m.stopCameraAnimation();
  if(m&&m.flyCameraTo){
    m.flyCameraTo({endCamera:{center:{lat:z.lat,lng:z.lng,altitude:0},range:VIEW.range,tilt:VIEW.tilt,heading:25},durationMillis:2600});
    if(orbiting) setTimeout(()=>startOrbit(side),2700);
  }
  renderTable();
}
function row(lab,va,vb,fmt,higherWins){
  const fa=va==null?'—':fmt(va), fb=vb==null?'—':fmt(vb);
  let ca='tie',cb='tie';
  if(va!=null&&vb!=null&&va!==vb){
    const aw=higherWins? va>vb : va<vb;
    ca=aw?'win':'lose'; cb=aw?'lose':'win';
  }
  return '<div class="trow"><span class="va '+ca+'">'+fa+'</span><span class="lab">'+lab+'</span><span class="vb '+cb+'">'+fb+'</span></div>';
}
function renderTable(){
  const a=Z(cur.A), b=Z(cur.B);
  const money=v=>'$'+Math.round(v).toLocaleString('es-MX');
  const pct=v=>v.toFixed(1)+'%';
  $('tbl').innerHTML=
    '<div class="trow"><span class="va" style="font-size:15px">'+a.n+'</span><span class="lab">ciudad</span><span class="vb" style="font-size:15px">'+b.n+'</span></div>'+
    row('Precio /m²',a.p,b.p,money,false)+
    row('Plusvalía /año',a.pl,b.pl,pct,true)+
    row('Yield renta',a.y,b.y,pct,true)+
    row('SHF 2016→2026',g10(a),g10(b),pct,true)+
    row('Pronóstico 5 años',f5(a),f5(b),pct,true)+
    '<div class="trow"><span class="va">'+(a.ci||'—')+'</span><span class="lab">ciclo</span><span class="vb">'+(b.ci||'—')+'</span></div>'+
    '<div class="note">Verde = mejor en ese renglón (precio: gana el más accesible) · <span class="amb">pronóstico BrickBit = estimado</span> · fuente SHF</div>';
}
init();
</script>
