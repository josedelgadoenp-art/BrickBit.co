# BrickBit · configuración de despliegue en Netlify
# Sitio estático (HTML en la raíz) + funciones serverless (netlify/functions).
# El Motor de Morfogénesis (app.py, Streamlit) NO corre en Netlify: se
# despliega desde este mismo repo en Streamlit Community Cloud
# (share.streamlit.io → app.py) y el sitio lo integra vía morfogenesis.html.

[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# HTML siempre se revalida (evita servir páginas viejas cacheadas)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# auth.js cambia con la lógica de sesión: que no se quede pegado
[[headers]]
  for = "/auth.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cabeceras básicas de seguridad para todo el sitio
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# URLs bonitas
[[redirects]]
  from = "/financial"
  to = "/financial.html"
  status = 200

[[redirects]]
  from = "/morfogenesis"
  to = "/morfogenesis.html"
  status = 200

[[redirects]]
  from = "/presentacion"
  to = "/docs/presentacion-brickbit.html"
  status = 200
